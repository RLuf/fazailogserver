# Rsyslog configuration
# Recebe logs e encaminha para o Graylog

# Módulos
module(load="imudp")
module(load="imtcp")
module(load="omfwd")

# Templates
template(name="GraylogFormat" type="string"
  string="<%PRI%>%TIMESTAMP% %HOSTNAME% %syslogtag%%msg%\n")

# Input - Escuta em todas as interfaces
input(type="imudp" port="514" address="0.0.0.0")
input(type="imtcp" port="514" address="0.0.0.0")

# Regras de processamento
# Logs de firewall
if $syslogtag contains "firewall" then {
    action(type="omfwd" 
           target="graylog" 
           port="514" 
           protocol="udp"
           template="GraylogFormat")
    stop
}

# Logs de aplicação
if $syslogtag contains "app" then {
    action(type="omfwd" 
           target="graylog" 
           port="514" 
           protocol="tcp"
           template="GraylogFormat")
    stop
}

# Logs de sistema
if $syslogfacility-text == "kern" or 
   $syslogfacility-text == "user" or
   $syslogfacility-text == "daemon" then {
    action(type="omfwd" 
           target="graylog" 
           port="514" 
           protocol="udp"
           template="GraylogFormat")
    stop
}

# Todos os outros logs
*.* action(type="omfwd" 
          target="graylog" 
          port="514" 
          protocol="udp"
          template="GraylogFormat")

# Salva localmente também
*.* /var/log/all-messages.log