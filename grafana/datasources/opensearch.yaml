apiVersion: 1
datasources:
  - name: OpenSearch
    type: grafana-opensearch-datasource
    access: proxy
    url: http://opensearch:9200
    basicAuth: false
    isDefault: false
    jsonData:
      database: "graylog_*"
      flavor: opensearch
      logLevelField: level
      logMessageField: message
      pplEnabled: true
      timeField: timestamp
      version: "2.11.0"
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
