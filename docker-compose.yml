version: '3.8'

services:
  # MongoDB para o Graylog
  mongodb:
    image: mongo:5.0
    container_name: mongodb
    volumes:
      - mongo_data:/data/db
    networks:
      - graylog-net
    restart: unless-stopped

  # OpenSearch para o Graylog (substitui o ElasticSearch)
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - graylog-net
    restart: unless-stopped

  # Graylog Server
  graylog:
    image: graylog/graylog:5.2
    container_name: graylog
    environment:
      # ALTERE A SENHA ABAIXO! (senha padrão: admin)
      - GRAYLOG_PASSWORD_SECRET=somepasswordpepper1234567890abcdefghijklmnopqrstuvwxyz
      # Password: admin (SHA2)
      - GRAYLOG_ROOT_PASSWORD_SHA2=8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918
      - GRAYLOG_HTTP_EXTERNAL_URI=http://0.0.0.0:9000/
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_MONGODB_URI=mongodb://mongodb:27017/graylog
    depends_on:
      - mongodb
      - opensearch
    ports:
      # Web interface
      - "9000:9000"
      # Syslog TCP
      - "514:514"
      # Syslog UDP
      - "514:514/udp"
      # GELF TCP
      - "12201:12201"
      # GELF UDP
      - "12201:12201/udp"
      # Raw TCP
      - "5555:5555"
      # CEF UDP
      - "5556:5556/udp"
      # Beats
      - "5044:5044"
    volumes:
      - graylog_data:/usr/share/graylog/data
    networks:
      - graylog-net
    restart: unless-stopped

  # Rsyslog como buffer/roteador
  rsyslog:
    image: rsyslog/syslog_appliance_alpine:latest
    container_name: rsyslog
    volumes:
      - ./rsyslog.conf:/etc/rsyslog.conf:ro
      - rsyslog_data:/var/log
    ports:
      # Syslog alternativo
      - "1514:514"
      - "1514:514/udp"
    networks:
      - graylog-net
    restart: unless-stopped

  # Grafana para visualizações adicionais
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - graylog-net
    restart: unless-stopped

  # Loki para logs alternativos
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - graylog-net
    restart: unless-stopped

  # Promtail para coletar logs locais
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - promtail_data:/tmp/positions
    command: -config.file=/etc/promtail/config.yml
    networks:
      - graylog-net
    restart: unless-stopped

networks:
  graylog-net:
    driver: bridge

volumes:
  mongo_data:
  opensearch_data:
  graylog_data:
  grafana_data:
  loki_data:
  promtail_data:
  rsyslog_data:
